version: "3.9"
services:
  postgres:
    image: postgres:16-alpine
    container_name: bi_postgres
    environment:
      POSTGRES_USER: bi_user
      POSTGRES_PASSWORD: bi_password
      POSTGRES_DB: bi_platform
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    restart: unless-stopped
  mongo:
    image: mongo:7
    container_name: bi_mongo
    volumes:
      - mongo_data:/data/db
    ports:
      - "27017:27017"
    restart: unless-stopped
  redis:
    image: redis:7-alpine
    container_name: bi_redis
    ports:
      - "6379:6379"
    restart: unless-stopped
volumes:
  postgres_data:
  mongo_data:
